name: Release packaging

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.package_version }}
      release_version: ${{ steps.version.outputs.release_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            bdf2psf \
            build-essential \
            ca-certificates \
            curl \
            git \
            python3 \
            sbcl \
            xfonts-utils

      - name: Install mkbold/mkitalic tools if unavailable
        run: |
          set -euo pipefail
          if command -v mkbold >/dev/null 2>&1 && \
             command -v mkitalic >/dev/null 2>&1 && \
             command -v mkbolditalic >/dev/null 2>&1; then
            echo "mkbold/mkitalic/mkbolditalic already available"
            exit 0
          fi

          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          git clone --depth 1 --branch 0.11 https://gitlab.com/unshumikan/mkbold-mkitalic.git "$tmpdir/mkbold-mkitalic"
          cd "$tmpdir/mkbold-mkitalic"
          expected_commit=a3105755c56d68d37cc3e9738389dfa18b4e5214
          actual_commit=$(git rev-parse HEAD)
          if [[ "$actual_commit" != "$expected_commit" ]]; then
            echo "mkbold-mkitalic 0.11 resolved to $actual_commit, expected $expected_commit" >&2
            exit 1
          fi
          make
          mkdir -p "$HOME/.local/bin"
          install -m 0755 mkbold mkitalic mkbolditalic "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Quicklisp
        run: |
          set -euo pipefail
          if [[ -f "$HOME/quicklisp/setup.lisp" ]]; then
            echo "Quicklisp already installed"
            exit 0
          fi
          curl -fsSLO https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
            --load quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))'

      - name: Compute release and package versions
        id: version
        run: |
          set -euo pipefail
          raw_version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD || echo ci)
          package_version=$(scripts/package-version.sh "$raw_version")
          echo "raw release version: $raw_version"
          echo "package version: $package_version"
          echo "release_version=$raw_version" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Build, check, and package
        env:
          VERSION: ${{ steps.version.outputs.release_version }}
        run: make ci

      - name: Verify release package
        run: |
          set -euo pipefail
          (cd dist/release && sha256sum -c *.tar.gz.sha256)
          tar -tzf dist/release/*.tar.gz | sed -n '1,40p'

      - name: Upload generated fonts artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dec-fonts-generated-fonts
          path: |
            README.org
            dist/dec.set
            dist/fonts/bdf
            dist/fonts/otb
            dist/fonts/psf
          if-no-files-found: error

      - name: Upload generated fonts artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: dec-fonts-generated-fonts
          path: |
            README.org
            dist/dec.set
            dist/fonts/bdf
            dist/fonts/otb
            dist/fonts/psf
          if-no-files-found: error

      - name: Upload release package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: dec-fonts-release-package
          path: dist/release/*
          if-no-files-found: error

  test-nix:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run Nix flake check in container
        run: make test-nix-flake-container CONTAINER_RUNTIME=docker

  package-deb:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download generated fonts artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Download generated fonts artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Install DEB packaging dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            dpkg-dev

      - name: Build DEB package
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: scripts/package-deb.sh --version "$VERSION"

      - name: Verify DEB checksum and listing
        run: |
          set -euo pipefail
          (cd dist/packages/deb && sha256sum -c *.sha256)
          dpkg-deb -c dist/packages/deb/*.deb | sed -n '1,80p'

      - name: Upload DEB package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dec-fonts-deb-package
          path: dist/packages/deb/*
          if-no-files-found: error

      - name: Upload DEB package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: dec-fonts-deb-package
          path: dist/packages/deb/*
          if-no-files-found: error

  package-rpm:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download generated fonts artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Download generated fonts artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Install RPM packaging dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            file \
            rpm

      - name: Build RPM package
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: scripts/package-rpm.sh --version "$VERSION"

      - name: Verify RPM checksum and listing
        run: |
          set -euo pipefail
          (cd dist/packages/rpm && sha256sum -c *.sha256)
          rpm -qlp dist/packages/rpm/*.rpm | sed -n '1,80p'

      - name: Upload RPM package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dec-fonts-rpm-package
          path: dist/packages/rpm/*
          if-no-files-found: error

      - name: Upload RPM package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: dec-fonts-rpm-package
          path: dist/packages/rpm/*
          if-no-files-found: error

  package-arch:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download generated fonts artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Download generated fonts artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Build Arch package
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e "VERSION=$VERSION" \
            -v "$PWD:/repo" \
            -w /repo \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              pacman -Sy --noconfirm --needed base-devel bash coreutils findutils fontconfig
              repo_uid=$(stat -c %u /repo)
              repo_gid=$(stat -c %g /repo)
              if [[ "$repo_uid" -eq 0 ]]; then
                repo_uid=1000
                repo_gid=1000
              fi
              if getent group "$repo_gid" >/dev/null; then
                group_name=$(getent group "$repo_gid" | cut -d: -f1)
              else
                group_name=builder
                groupadd -g "$repo_gid" "$group_name"
              fi
              if getent passwd "$repo_uid" >/dev/null; then
                user_name=$(getent passwd "$repo_uid" | cut -d: -f1)
              else
                user_name=builder
                useradd -m -u "$repo_uid" -g "$repo_gid" "$user_name"
              fi
              mkdir -p /repo/dist/packages/arch
              chown -R "$repo_uid:$repo_gid" /repo/dist/packages/arch
              runuser -u "$user_name" -- ./scripts/package-arch.sh --version "$VERSION"
            '

      - name: Verify Arch checksum and listing
        run: |
          set -euo pipefail
          (cd dist/packages/arch && sha256sum -c *.sha256)
          package=$(find dist/packages/arch -maxdepth 1 -type f -name '*.pkg.tar*' ! -name '*.sha256' ! -name '*.sig' -print -quit)
          [[ -n "$package" ]] || { echo "missing Arch package" >&2; exit 1; }
          tar -tf "$package" | sed -n '1,80p'

      - name: Upload Arch package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dec-fonts-arch-package
          path: dist/packages/arch/*
          if-no-files-found: error

      - name: Upload Arch package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: dec-fonts-arch-package
          path: dist/packages/arch/*
          if-no-files-found: error

  package-void:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download generated fonts artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Download generated fonts artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-generated-fonts
          path: .

      - name: Build Void package
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: scripts/package-void.sh --version "$VERSION" --runtime docker

      - name: Verify Void checksum and listing
        run: |
          set -euo pipefail
          (cd dist/packages/void && sha256sum -c *.sha256)
          ls -l dist/packages/void

      - name: Upload Void package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dec-fonts-void-package
          path: dist/packages/void/*
          if-no-files-found: error

      - name: Upload Void package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: dec-fonts-void-package
          path: dist/packages/void/*
          if-no-files-found: error

  test-deb:
    runs-on: ubuntu-latest
    needs: package-deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download DEB package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-deb-package
          path: dist/packages/deb

      - name: Download DEB package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-deb-package
          path: dist/packages/deb

      - name: Install and verify DEB package in container
        run: |
          set -euo pipefail
          scripts/test-linux-package-container.sh \
            --runtime docker \
            --format deb \
            --package dist/packages/deb/*.deb

  test-rpm:
    runs-on: ubuntu-latest
    needs: package-rpm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download RPM package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-rpm-package
          path: dist/packages/rpm

      - name: Download RPM package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-rpm-package
          path: dist/packages/rpm

      - name: Install and verify RPM package in container
        run: |
          set -euo pipefail
          scripts/test-linux-package-container.sh \
            --runtime docker \
            --format rpm \
            --package dist/packages/rpm/*.rpm

  test-arch:
    runs-on: ubuntu-latest
    needs: package-arch

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download Arch package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-arch-package
          path: dist/packages/arch

      - name: Download Arch package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-arch-package
          path: dist/packages/arch

      - name: Install and verify Arch package in container
        run: |
          set -euo pipefail
          package=$(find dist/packages/arch -maxdepth 1 -type f -name '*.pkg.tar*' ! -name '*.sha256' ! -name '*.sig' -print -quit)
          scripts/test-linux-package-container.sh \
            --runtime docker \
            --format arch \
            --package "$package"

  test-void:
    runs-on: ubuntu-latest
    needs: package-void

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download Void package artifact (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: dec-fonts-void-package
          path: dist/packages/void

      - name: Download Void package artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-void-package
          path: dist/packages/void

      - name: Install and verify Void package in container
        run: |
          set -euo pipefail
          scripts/test-linux-package-container.sh \
            --runtime docker \
            --format void \
            --package dist/packages/void/*.xbps

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - test-nix
      - test-deb
      - test-rpm
      - test-arch
      - test-void
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write

    steps:
      - name: Download release tarball artifact
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-release-package
          path: release-assets

      - name: Download DEB package artifact
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-deb-package
          path: release-assets

      - name: Download RPM package artifact
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-rpm-package
          path: release-assets

      - name: Download Arch package artifact
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-arch-package
          path: release-assets

      - name: Download Void package artifact
        uses: actions/download-artifact@v7
        with:
          name: dec-fonts-void-package
          path: release-assets

      - name: Verify release asset checksums
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum -c ./*.sha256
          find . -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_flags=()
          case "$TAG_NAME" in
            *alpha*|*beta*|*rc*|*pre*) release_flags+=(--prerelease) ;;
          esac

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "DEC-Fonts $TAG_NAME" \
              "${release_flags[@]}"
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --title "DEC-Fonts $TAG_NAME" \
              --notes "Automated release assets for DEC-Fonts $TAG_NAME." \
              "${release_flags[@]}"
          fi
